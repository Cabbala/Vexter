name: validate

on:
  push:
  pull_request:

jobs:
  bootstrap-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Build proof bundle
        run: ./scripts/build_proof_bundle.sh

      - name: Run bootstrap tests
        run: pytest -q
