name: validate

on:
  push:
  pull_request:

jobs:
  bootstrap-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run transport livepaper observability CI gate
        run: ./scripts/run_transport_livepaper_observability_ci_gate.sh

      - name: Show transport livepaper observability CI gate summary
        if: always()
        run: cat artifacts/proofs/task-007-transport-livepaper-observability-ci-gate-summary.md

      - name: Upload transport livepaper observability CI gate proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transport-livepaper-observability-ci-gate-proof
          path: |
            artifacts/proofs/task-007-transport-livepaper-observability-ci-gate-check.json
            artifacts/proofs/task-007-transport-livepaper-observability-ci-gate-summary.md
            artifacts/proofs/task-007-transport-livepaper-observability-ci-gate-pytest.log

      - name: Run transport livepaper observability watchdog
        run: ./scripts/run_transport_livepaper_observability_watchdog.sh

      - name: Show transport livepaper observability watchdog summary
        if: always()
        run: cat artifacts/proofs/task-007-transport-livepaper-observability-watchdog-summary.md

      - name: Upload transport livepaper observability watchdog proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transport-livepaper-observability-watchdog-proof
          path: |
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-check.json
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-summary.md
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-pytest.log

      - name: Run transport livepaper observability watchdog runtime
        run: ./scripts/run_transport_livepaper_observability_watchdog_runtime.sh

      - name: Show transport livepaper observability watchdog runtime summary
        if: always()
        run: cat artifacts/proofs/task-007-transport-livepaper-observability-watchdog-runtime-summary.md

      - name: Upload transport livepaper observability watchdog runtime proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transport-livepaper-observability-watchdog-runtime-proof
          path: |
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-runtime-check.json
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-runtime-summary.md
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-runtime-pytest.log

      - name: Run transport livepaper observability watchdog regression pack
        run: ./scripts/run_transport_livepaper_observability_watchdog_regression_pack.sh

      - name: Show transport livepaper observability watchdog regression pack summary
        if: always()
        run: cat artifacts/proofs/task-007-transport-livepaper-observability-watchdog-regression-pack-summary.md

      - name: Upload transport livepaper observability watchdog regression pack proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transport-livepaper-observability-watchdog-regression-pack-proof
          path: |
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-regression-pack-check.json
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-regression-pack-summary.md
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-regression-pack-pytest.log

      - name: Run transport livepaper observability watchdog CI gate
        run: ./scripts/run_transport_livepaper_observability_watchdog_ci_gate.sh

      - name: Show transport livepaper observability watchdog CI gate summary
        if: always()
        run: cat artifacts/proofs/task-007-transport-livepaper-observability-watchdog-ci-gate-summary.md

      - name: Upload transport livepaper observability watchdog CI gate proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transport-livepaper-observability-watchdog-ci-gate-proof
          path: |
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-ci-gate-check.json
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-ci-gate-summary.md
            artifacts/proofs/task-007-transport-livepaper-observability-watchdog-ci-gate-pytest.log

      - name: Run livepaper observability shift handoff CI check
        run: ./scripts/run_livepaper_observability_shift_handoff_ci_check.sh

      - name: Show livepaper observability shift handoff CI check summary
        if: always()
        run: cat artifacts/proofs/task-007-livepaper-observability-shift-handoff-ci-check-summary.md

      - name: Upload livepaper observability shift handoff CI check proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: livepaper-observability-shift-handoff-ci-check-proof
          path: |
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-ci-check-check.json
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-ci-check-summary.md
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-ci-check-pytest.log
            artifacts/reports/task-007-livepaper-observability-shift-handoff-ci-check-report.md
            artifacts/reports/task-007-livepaper-observability-shift-handoff-ci-check-status.md

      - name: Run livepaper observability shift handoff watchdog
        run: ./scripts/run_livepaper_observability_shift_handoff_watchdog.sh

      - name: Show livepaper observability shift handoff watchdog summary
        if: always()
        run: cat artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-summary.md

      - name: Upload livepaper observability shift handoff watchdog proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: livepaper-observability-shift-handoff-watchdog-proof
          path: |
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-check.json
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-summary.md
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-pytest.log
            artifacts/reports/task-007-livepaper-observability-shift-handoff-watchdog-report.md
            artifacts/reports/task-007-livepaper-observability-shift-handoff-watchdog-status.md

      - name: Run livepaper observability shift handoff watchdog runtime
        run: ./scripts/run_livepaper_observability_shift_handoff_watchdog_runtime.sh

      - name: Show livepaper observability shift handoff watchdog runtime summary
        if: always()
        run: cat artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-runtime-summary.md

      - name: Upload livepaper observability shift handoff watchdog runtime proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: livepaper-observability-shift-handoff-watchdog-runtime-proof
          path: |
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-runtime-check.json
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-runtime-summary.md
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-runtime-pytest.log
            artifacts/reports/task-007-livepaper-observability-shift-handoff-watchdog-runtime-report.md
            artifacts/reports/task-007-livepaper-observability-shift-handoff-watchdog-runtime-status.md

      - name: Run livepaper observability shift handoff watchdog regression pack
        run: ./scripts/run_livepaper_observability_shift_handoff_watchdog_regression_pack.sh

      - name: Show livepaper observability shift handoff watchdog regression pack summary
        if: always()
        run: cat artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-regression-pack-summary.md

      - name: Upload livepaper observability shift handoff watchdog regression pack proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: livepaper-observability-shift-handoff-watchdog-regression-pack-proof
          path: |
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-regression-pack-check.json
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-regression-pack-summary.md
            artifacts/proofs/task-007-livepaper-observability-shift-handoff-watchdog-regression-pack-pytest.log
            artifacts/reports/task-007-livepaper-observability-shift-handoff-watchdog-regression-pack-report.md
            artifacts/reports/task-007-livepaper-observability-shift-handoff-watchdog-regression-pack-status.md
            artifacts/reports/task-007-livepaper-observability-shift-handoff-watchdog-regression-pack/HANDOFF.md

      - name: Build proof bundle
        run: ./scripts/build_proof_bundle.sh

      - name: Run remaining tests
        run: pytest -q -m "not livepaper_observability_shift_handoff_ci_check and not livepaper_observability_shift_handoff_watchdog and not livepaper_observability_shift_handoff_watchdog_runtime and not livepaper_observability_shift_handoff_watchdog_regression_pack and not transport_livepaper_observability_watchdog_ci_gate and not transport_livepaper_observability_ci_gate and not transport_livepaper_observability_watchdog and not transport_livepaper_observability_watchdog_runtime and not transport_livepaper_observability_watchdog_regression_pack"
