name: validate

on:
  push:
  pull_request:

jobs:
  bootstrap-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run transport livepaper observability CI gate
        run: ./scripts/run_transport_livepaper_observability_ci_gate.sh

      - name: Show transport livepaper observability CI gate summary
        if: always()
        run: cat artifacts/proofs/task-007-transport-livepaper-observability-ci-gate-summary.md

      - name: Upload transport livepaper observability CI gate proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transport-livepaper-observability-ci-gate-proof
          path: |
            artifacts/proofs/task-007-transport-livepaper-observability-ci-gate-check.json
            artifacts/proofs/task-007-transport-livepaper-observability-ci-gate-summary.md
            artifacts/proofs/task-007-transport-livepaper-observability-ci-gate-pytest.log

      - name: Build proof bundle
        run: ./scripts/build_proof_bundle.sh

      - name: Run remaining tests
        run: pytest -q -m "not transport_livepaper_observability_ci_gate"
