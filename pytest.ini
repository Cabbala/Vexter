[pytest]
markers =
    livepaper_observability_shift_handoff_ci_check: grouped CI gate coverage for required live-paper observability shift handoff faces
    livepaper_observability_shift_handoff_watchdog: bounded drift, omission, and partial-visibility coverage for live-paper shift handoff artifacts
    livepaper_observability_shift_handoff_watchdog_runtime: runtime-shaped follow-up coverage for live-paper shift handoff watchdog artifacts
    livepaper_observability_shift_handoff_watchdog_regression_pack: durable dual-handoff regression-pack coverage for required shift handoff watchdog faces
    livepaper_observability_shift_handoff_watchdog_ci_gate: grouped watchdog CI gate coverage that keeps the handoff watchdog, runtime, and regression-pack surfaces green in CI
    transport_livepaper_observability_watchdog_ci_gate: grouped watchdog CI gate coverage for transport live-paper observability drift and omission surfaces
    transport_livepaper_observability_ci_gate: source-faithful live-paper observability transport CI gate coverage
    transport_livepaper_observability_watchdog: bounded live-paper observability watchdog coverage
    transport_livepaper_observability_watchdog_runtime: runtime-oriented live-paper observability watchdog coverage
    transport_livepaper_observability_watchdog_regression_pack: durable live-paper observability watchdog regression-pack coverage
